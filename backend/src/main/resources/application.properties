spring.application.name=EleventhHour

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/eleventh_hour_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=atharv
spring.datasource.password=atharv
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Gemini API setting mapping the system environment variable
gemini.api.key=${GEMINI_API_KEY}